name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x pi-companion-exp/gradlew

      - name: Decode keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.jks
          echo "KEYSTORE_PATH=/tmp/release.jks" >> "$GITHUB_ENV"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "code=$(date +%s)" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.inputs.version_name || '1.0.0-dev' }}" >> "$GITHUB_OUTPUT"
            echo "code=$(date +%s)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK
        run: |
          cd pi-companion-exp
          ./gradlew :app:assembleRelease
        env:
          KEYSTORE_PATH: /tmp/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pi-companion-${{ steps.version.outputs.name }}
          path: pi-companion-exp/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "pi-companion v${{ steps.version.outputs.name }}" \
            --generate-notes \
            pi-companion-exp/app/build/outputs/apk/release/*.apk#pi-companion-${{ steps.version.outputs.name }}.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x pi-companion-exp/gradlew

      - name: Decode keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.jks
          echo "KEYSTORE_PATH=/tmp/release.jks" >> "$GITHUB_ENV"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "code=$(date +%s)" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.inputs.version_name || '1.0.0-dev' }}" >> "$GITHUB_OUTPUT"
            echo "code=$(date +%s)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK
        run: |
          cd pi-companion-exp
          ./gradlew :app:assembleRelease
        env:
          KEYSTORE_PATH: /tmp/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}

      - name: Stage APK with versioned name
        run: |
          mkdir -p staging
          cp pi-companion-exp/app/build/outputs/apk/release/*.apk \
            "staging/pi-companion-${{ steps.version.outputs.name }}.apk"

      # Kept as a build record. Note: GitHub always serves artifacts as a
      # .zip download; for the raw .apk use the Release asset below.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-companion-${{ steps.version.outputs.name }}
          path: staging/*.apk
          retention-days: 90

      # Release assets are downloaded as raw files (no zip wrapper), so this
      # is where the directly-installable .apk lives. Runs on both tag pushes
      # (proper release) and manual dispatch (prerelease) so you always get a
      # usable APK link.
      - name: Create GitHub Release
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            gh release create "$GITHUB_REF_NAME" \
              --title "pi-companion v${{ steps.version.outputs.name }}" \
              --generate-notes \
              "staging/pi-companion-${{ steps.version.outputs.name }}.apk"
          else
            gh release create "v${{ steps.version.outputs.name }}-${{ github.run_number }}" \
              --title "pi-companion ${{ steps.version.outputs.name }} (build ${{ github.run_number }})" \
              --notes "Manual build from ${{ github.sha }}" \
              --prerelease \
              "staging/pi-companion-${{ steps.version.outputs.name }}.apk"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
